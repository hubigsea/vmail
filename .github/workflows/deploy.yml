# 工作流名称
name: Deploy to Cloudflare

# 触发条件
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 新增一个 job 用于检查密钥是否存在
  check_credentials:
    runs-on: ubuntu-latest
    name: Check for Cloudflare Credentials
    outputs:
      has_creds: ${{ steps.cf_creds.outputs.has_creds }}
    steps:
      - name: Check for Cloudflare credentials
        id: cf_creds
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then
            echo "Cloudflare credentials not found, skipping deployment."
            echo "has_creds=false" >> $GITHUB_OUTPUT
          else
            echo "Cloudflare credentials found."
            echo "has_creds=true" >> $GITHUB_OUTPUT
          fi

  # 部署 job，依赖于 check_credentials job 的结果
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: check_credentials
    if: needs.check_credentials.outputs.has_creds == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Configure Wrangler
        run: |
          python <<'PY'
          from pathlib import Path
          import os

          path = Path("wrangler.toml")
          text = path.read_text()

          replacements = {
              "${D1_DATABASE_ID}": os.environ["D1_DATABASE_ID"],
              "${D1_DATABASE_NAME}": os.environ["D1_DATABASE_NAME"],
              "${EMAIL_DOMAIN}": os.environ["EMAIL_DOMAIN"],
              "${COOKIES_SECRET}": os.environ["COOKIES_SECRET"],
              "${TURNSTILE_KEY}": os.environ["TURNSTILE_KEY"],
              "${TURNSTILE_SECRET}": os.environ["TURNSTILE_SECRET"],
          }

          for placeholder, value in replacements.items():
              text = text.replace(placeholder, value)

          path.write_text(text)
          print("wrangler.toml 配置占位符替换完成")
          PY
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
          COOKIES_SECRET: ${{ secrets.COOKIES_SECRET }}
          TURNSTILE_KEY: ${{ secrets.TURNSTILE_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}

      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply ${{ secrets.D1_DATABASE_NAME }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
